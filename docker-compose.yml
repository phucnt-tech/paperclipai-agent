services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "${PAPERCLIP_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    # On Linux, host.docker.internal is not guaranteed unless we map it.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:${PAPERCLIP_PORT:-3100}}"
      # Comma-separated allowlist for private exposure Host header guard.
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES:-localhost,127.0.0.1,10.66.66.1}"
      # Explicit extra origins for Better Auth (must be full origins, including port).
      BETTER_AUTH_TRUSTED_ORIGINS: "${BETTER_AUTH_TRUSTED_ORIGINS:-http://10.66.66.1:3100}"
      # Host path mapping for the /paperclip volume (lets non-container runtimes access workspaces on disk).
      PAPERCLIP_HOST_PAPERCLIP_HOME: "${PAPERCLIP_HOST_PAPERCLIP_HOME:-}"
      PAPERCLIP_AUTO_COMMENT_RUN_SUMMARY: "${PAPERCLIP_AUTO_COMMENT_RUN_SUMMARY:-true}"
      PAPERCLIP_CODEX_INJECT_SKILLS: "${PAPERCLIP_CODEX_INJECT_SKILLS:-true}"
      PAPERCLIP_CODEX_LOG_SKILL_INJECTION: "${PAPERCLIP_CODEX_LOG_SKILL_INJECTION:-true}"
      PAPERCLIP_TELEGRAM_LOG_ENABLED: "${PAPERCLIP_TELEGRAM_LOG_ENABLED:-true}"
      PAPERCLIP_TELEGRAM_CHAT_ID: "${PAPERCLIP_TELEGRAM_CHAT_ID:-}"
      PAPERCLIP_TELEGRAM_BOT_TOKEN: "${PAPERCLIP_TELEGRAM_BOT_TOKEN:-}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-}"
      PAPERCLIP_OPENCLAW_INTERNAL_WS_URL: "${PAPERCLIP_OPENCLAW_INTERNAL_WS_URL:-ws://paperclip-openclaw-ceo:18789}"
      PAPERCLIP_OPENCLAW_INTERNAL_TOKEN: "${PAPERCLIP_OPENCLAW_INTERNAL_TOKEN:-}"
      PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH: "${PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH:-/paperclip/openclaw-native-device.pem}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - paperclip-data:/paperclip
      # Optional host Codex home mount (configurable). Default: /root/.codex on host -> /root/.codex in container.
      - "${PAPERCLIP_CODEX_HOST_DIR:-/root/.codex}:${PAPERCLIP_CODEX_CONTAINER_DIR:-/paperclip/.codex}"
    depends_on:
      db:
        condition: service_healthy
      paperclip-openclaw-ceo:
        condition: service_started

  paperclip-openclaw-ceo:
    image: ${PAPERCLIP_OPENCLAW_IMAGE:-otsphucnt/paperclip-openclaw-ceo:20260312-1638}
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_TOKEN: "${PAPERCLIP_OPENCLAW_INTERNAL_TOKEN:-change_me_internal_token}"
      OPENCLAW_GATEWAY_BIND: "0.0.0.0:18789"
      PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH: "${PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH:-/paperclip/openclaw-native-device.pem}"
      OPENCLAW_AUTO_APPROVE_DEVICE_PAIRING: "${OPENCLAW_AUTO_APPROVE_DEVICE_PAIRING:-true}"
    volumes:
      - openclaw-home:/root/.openclaw
      - paperclip-data:/paperclip

volumes:
  pgdata:
    external: true
    name: da8ffeebc55fa983116098ad9237cc520766fc3fe542056e56ec3095e49bfaae
  paperclip-data:
  openclaw-home:
