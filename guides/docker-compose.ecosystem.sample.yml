services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperclip
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 3s
      retries: 20

  paperclip-server:
    image: otsphucnt/paperclip-agent:20260312-1102
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      paperclip-openclaw-ceo:
        condition: service_started
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change_me}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES:-localhost,127.0.0.1}"
      BETTER_AUTH_TRUSTED_ORIGINS: "${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:3100}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-}"
      # Embedded OpenClaw defaults
      PAPERCLIP_OPENCLAW_INTERNAL_WS_URL: "${PAPERCLIP_OPENCLAW_INTERNAL_WS_URL:-ws://paperclip-openclaw-ceo:18789}"
      PAPERCLIP_OPENCLAW_INTERNAL_TOKEN: "${PAPERCLIP_OPENCLAW_INTERNAL_TOKEN:-change_me_internal_token}"
      PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH: "${PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH:-/paperclip/openclaw-native-device.pem}"
    volumes:
      - paperclip-data:/paperclip

  paperclip-openclaw-ceo:
    image: ${PAPERCLIP_OPENCLAW_IMAGE:-otsphucnt/paperclip-openclaw-ceo:20260312-1638}
    restart: unless-stopped
    environment:
      OPENCLAW_GATEWAY_TOKEN: "${PAPERCLIP_OPENCLAW_INTERNAL_TOKEN:-change_me_internal_token}"
      PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH: "${PAPERCLIP_OPENCLAW_NATIVE_DEVICE_PRIVATE_KEY_PATH:-/paperclip/openclaw-native-device.pem}"
      OPENCLAW_AUTO_APPROVE_DEVICE_PAIRING: "${OPENCLAW_AUTO_APPROVE_DEVICE_PAIRING:-true}"
    # Image already starts OpenClaw gateway via built-in entrypoint script.
    volumes:
      - openclaw-home:/root/.openclaw
      - paperclip-data:/paperclip

volumes:
  pgdata:
  paperclip-data:
  openclaw-home:
